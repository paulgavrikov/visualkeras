# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2/

version: 2

# Build settings
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Python environment
python:
  version: 3.11
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .

# Sphinx configuration
sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

# Output formats
formats:
  - pdf
  - epub

# Build on push to these branches
branches:
  include:
    - master
    - camera-ready
    - main

# Search settings
search:
  ranking:
    api/index: -1

# Redirects
redirects:
  docs/index.html: index.html
