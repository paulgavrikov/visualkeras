name: Build Documentation

on:
  push:
    branches:
      - master
      - camera-ready
      - main
    paths:
      - 'docs/**'
      - 'visualkeras/**'
      - '.github/workflows/build-docs.yml'
  pull_request:
    branches:
      - master
      - camera-ready
      - main
    paths:
      - 'docs/**'
      - 'visualkeras/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-docs-${{ hashFiles('docs/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-docs-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r docs/requirements.txt
        pip install -e .

    - name: Build documentation
      run: |
        cd docs
        sphinx-build -b html -d build/doctrees source build/html

    - name: Check for warnings
      run: |
        cd docs
        sphinx-build -b html -W --keep-going -d build/doctrees source build/html 2>&1 | tee sphinx-output.txt
        # Note: -W converts warnings to errors. If you want to allow some warnings, remove this flag.
      continue-on-error: true

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sphinx-html
        path: docs/build/html/
        retention-days: 7

    - name: Post build summary
      if: always()
      run: |
        echo "## Documentation Build Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f docs/sphinx-output.txt ]; then
          echo "Build completed with output:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 docs/sphinx-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "Documentation built successfully" >> $GITHUB_STEP_SUMMARY
        fi
