name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies (unit)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest -m "not integration" -v

  renderers-and-coverage:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (renderers + coverage)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          pip install tensorflow==2.17.0

      - name: Run full test suite with coverage
        env:
          TF_CPP_MIN_LOG_LEVEL: "2"
        run: |
          python -m pytest -v \
            --cov=visualkeras \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html \
            --cov-fail-under=85

      - name: Publish coverage summary
        if: always()
        run: |
          {
            echo "## Coverage Summary"
            echo '```text'
            python -m coverage report --show-missing
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: error

  keras-standalone-smoke:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install standalone keras + tensorflow backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "keras>=3,<4" tensorflow==2.17.0

      - name: Run standalone keras smoke
        env:
          KERAS_BACKEND: tensorflow
        run: |
          python - <<'PY'
          import keras
          import visualkeras

          model = keras.Sequential(
              [
                  keras.layers.Input(shape=(8,), name="input"),
                  keras.layers.Dense(4, activation="relu", name="dense"),
                  keras.layers.Dense(2, activation="softmax", name="out"),
              ]
          )
          layered = visualkeras.layered_view(model)
          graph = visualkeras.graph_view(model)
          assert layered.size[0] > 0 and layered.size[1] > 0
          assert graph.size[0] > 0 and graph.size[1] > 0
          print("Standalone keras smoke passed")
          PY
